<svg width="800" height="240" viewBox="0 0 800 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="240" fill="#141413"/>
  <rect x="20" y="20" width="760" height="200" rx="20" fill="#E8E6DC"/>
  
  <text x="50" y="60" fill="#141413" font-family="Inter, sans-serif" font-size="20" font-weight="800" letter-spacing="-0.04em">CATALYST SCOUT</text>
  <rect x="50" y="70" width="160" height="24" rx="12" fill="#3ECF8E"/>
  <text x="130" y="86" fill="white" font-family="Geist Mono, monospace" font-size="10" font-weight="600" letter-spacing="0.1em" text-anchor="middle">DB INFRASTRUCTURE</text>
  
  <!-- Postgres Cylinder -->
  <g transform="translate(380, 80)">
    <ellipse cx="40" cy="10" rx="30" ry="10" stroke="#141413" stroke-width="2"/>
    <path d="M10 10V60C10 65.5228 23.4315 70 40 70C56.5685 70 70 65.5228 70 60V10" stroke="#141413" stroke-width="2"/>
    <text x="40" y="45" fill="#141413" font-family="Geist Mono, monospace" font-size="8" font-weight="800" text-anchor="middle">LOGS</text>
    
    <!-- Real-time waves -->
    <path d="M80 30C100 20 120 40 140 30" stroke="#00D992" stroke-width="2" stroke-opacity="0.6">
      <animate attributeName="stroke-dashoffset" values="20;0" dur="1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
    </path>
  </g>
  
  <!-- pg_cron Module -->
  <g transform="translate(580, 100)">
    <rect x="0" y="0" width="60" height="60" rx="8" fill="#141413"/>
    <circle cx="30" cy="25" r="12" stroke="#00D992" stroke-width="2"/>
    <path d="M30 18V25L35 30" stroke="#00D992" stroke-width="2" stroke-linecap="round"/>
    <text x="30" y="50" fill="white" font-family="Geist Mono, monospace" font-size="7" font-weight="700" text-anchor="middle">PG_CRON</text>
  </g>
</svg>

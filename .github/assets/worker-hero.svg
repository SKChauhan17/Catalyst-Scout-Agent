<svg width="800" height="240" viewBox="0 0 800 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="240" fill="#141413"/>
  <rect x="20" y="20" width="760" height="200" rx="20" fill="#E8E6DC"/>
  
  <text x="50" y="60" fill="#141413" font-family="Inter, sans-serif" font-size="20" font-weight="800" letter-spacing="-0.04em">CATALYST SCOUT</text>
  <rect x="50" y="70" width="130" height="24" rx="12" fill="#2A9D8F"/>
  <text x="115" y="86" fill="white" font-family="Geist Mono, monospace" font-size="10" font-weight="600" letter-spacing="0.1em" text-anchor="middle">ASYNC WORKER</text>
  
  <!-- QStash Orchestration -->
  <!-- JD Icon -->
  <g transform="translate(300, 100)">
    <rect x="0" y="0" width="40" height="50" rx="2" fill="#141413"/>
    <path d="M10 15H30M10 25H30M10 35H20" stroke="white" stroke-width="2"/>
    
    <!-- Flow arrow -->
    <path d="M50 25H90" stroke="#141413" stroke-width="2" stroke-dasharray="4 4"/>
  </g>
  
  <!-- QStash Queue -->
  <g transform="translate(400, 90)">
    <rect x="0" y="0" width="60" height="70" rx="4" stroke="#141413" stroke-width="2"/>
    <rect x="5" y="5" width="50" height="15" rx="2" fill="#141413"/>
    <rect x="5" y="25" width="50" height="15" rx="2" fill="#141413"/>
    <rect x="5" y="45" width="50" height="15" rx="2" fill="#141413"/>
  </g>
  
  <!-- Worker Execution -->
  <g transform="translate(520, 80)">
    <rect x="0" y="0" width="140" height="90" rx="10" fill="#141413"/>
    <text x="70" y="45" fill="#00D992" font-family="Geist Mono, monospace" font-size="11" font-weight="800" text-anchor="middle">BACKGROUND_EXECUTOR</text>
    <rect x="20" y="60" width="100" height="4" rx="2" fill="#525252"/>
    <rect x="20" y="60" width="60" height="4" rx="2" fill="#00D992">

<svg width="800" height="240" viewBox="0 0 800 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="240" fill="#141413"/>
  <rect x="20" y="20" width="760" height="200" rx="20" fill="#E8E6DC"/>
  
  <text x="50" y="60" fill="#141413" font-family="Inter, sans-serif" font-size="20" font-weight="800" letter-spacing="-0.04em">CATALYST SCOUT</text>
  <rect x="50" y="70" width="180" height="24" rx="12" fill="#3D5A80"/>
  <text x="140" y="86" fill="white" font-family="Geist Mono, monospace" font-size="10" font-weight="600" letter-spacing="0.1em" text-anchor="middle">"IMMORTAL" AI ROUTER</text>
  
  <!-- Waterfall Visualization -->
  <!-- Layered Segments -->
  <g transform="translate(350, 60)">
    <!-- Top segments with 429 warnings -->
    <rect x="0" y="0" width="120" height="12" rx="2" fill="#141413" fill-opacity="0.8"/>
    <rect x="5" y="15" width="120" height="12" rx="2" fill="#141413" fill-opacity="0.8"/>
    <text x="130" y="10" fill="#FF4B4B" font-family="Geist Mono, monospace" font-size="7" font-weight="700">429 LIMIT</text>
    
    <!-- Path Glow -->
    <path d="M60 30L60 100L200 100" stroke="#00D992" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Cascading layers -->
    <rect x="10" y="30" width="120" height="12" rx="2" fill="#141413" fill-opacity="0.6"/>
    <rect x="15" y="45" width="120" height="12" rx="2" fill="#141413" fill-opacity="0.4"/>
    
    <!-- Powerhouse block -->
    <rect x="180" y="80" width="140" height="60" rx="8" fill="#141413"/>
    <text x="250" y="115" fill="#00D992" font-family="Geist Mono, monospace" font-size="12" font-weight="800" text-anchor="middle">GEMINI_POWER</text>
  </g>
</svg>

<svg width="800" height="240" viewBox="0 0 800 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with subtle warm gradient -->
  <rect width="800" height="240" fill="#F9F6F1"/>
  <rect x="20" y="20" width="760" height="200" rx="24" fill="white" stroke="#E5E0D8" stroke-width="1"/>
  
  <!-- Subtle decorative elements -->
  <circle cx="720" cy="60" r="40" fill="#00D992" fill-opacity="0.05"/>
  <path d="M40 160C100 140 180 180 260 160C340 140 420 180 500 160" stroke="#00D992" stroke-opacity="0.1" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Badge -->
  <rect x="50" y="50" width="100" height="24" rx="12" fill="#D27D5F"/>
  <text x="100" y="66" fill="white" font-family="Geist Mono, monospace" font-size="10" font-weight="600" letter-spacing="0.1em" text-anchor="middle">EDITORIAL AI</text>
  
  <!-- Title -->
  <text x="50" y="115" fill="#141413" font-family="Georgia, serif" font-size="42" font-weight="700" letter-spacing="-0.02em">Catalyst Scout</text>
  
  <!-- Subtitle -->
  <text x="50" y="145" fill="#525252" font-family="Inter, sans-serif" font-size="16" font-weight="400">Zero-compromise AI talent scouting. Precision search. Real-time intelligence.</text>
  
  <!-- Separator -->
  <line x1="50" y1="165" x2="300" y2="165" stroke="#E5E0D8" stroke-width="1"/>
  
  <!-- Footer Badges -->
  <rect x="50" y="180" width="120" height="28" rx="6" fill="#141413"/>
  <text x="110" y="198" fill="white" font-family="Inter, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Next.js + LangGraph</text>
  
  <rect x="180" y="180" width="110" height="28" rx="14" fill="#F0EFEA"/>
  <text x="235" y="198" fill="#525252" font-family="Inter, sans-serif" font-size="11" font-weight="500" text-anchor="middle">Supabase Vector</text>
  
  <rect x="300" y="180" width="110" height="28" rx="14" fill="#F0EFEA"/>
  <text x="355" y="198" fill="#525252" font-family="Inter, sans-serif" font-size="11" font-weight="500" text-anchor="middle">QStash Worker</text>
  
  <!-- Floating Icon -->
  <rect x="680" y="80" width="60" height="60" rx="16" fill="white" stroke="#E5E0D8" stroke-width="1"/>
  <path d="M700 100L720 120L710 120L710 130" stroke="#00D992" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="710" cy="110" r="4" stroke="#00D992" stroke-width="2"/>
</svg>

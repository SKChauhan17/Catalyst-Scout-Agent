<svg width="800" height="240" viewBox="0 0 800 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="240" fill="#141413"/>
  <rect x="20" y="20" width="760" height="200" rx="20" fill="#E8E6DC"/>
  
  <text x="50" y="60" fill="#141413" font-family="Inter, sans-serif" font-size="20" font-weight="800" letter-spacing="-0.04em">CATALYST SCOUT</text>
  <rect x="50" y="70" width="120" height="24" rx="12" fill="#141413"/>
  <text x="110" y="86" fill="white" font-family="Geist Mono, monospace" font-size="10" font-weight="600" letter-spacing="0.1em" text-anchor="middle">DESIGN SYSTEM</text>
  
  <!-- Component Grid -->
  <g transform="translate(300, 60)">
    <!-- Terminal Preview -->
    <rect x="0" y="0" width="140" height="70" rx="6" fill="#141413"/>
    <rect x="10" y="15" width="60" height="3" rx="1.5" fill="#00D992"/>
